<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIBASE ポイント管理画面</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #333; }
  .header { background: #111; color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; }
  .tabs { display: flex; gap: 8px; }
  .tab { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; background: #333; color: #fff; font-size: 14px; }
  .tab.active { background: #fff; color: #111; }
  .container { max-width: 1000px; margin: 24px auto; padding: 0 16px; }
  .card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .card h2 { font-size: 16px; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #f9f9f9; padding: 10px 12px; text-align: left; font-size: 13px; color: #666; border-bottom: 1px solid #eee; }
  td { padding: 10px 12px; font-size: 14px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  .rarity-badge { padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; color: #fff; }
  .rarity-normal { background: #aaa; }
  .rarity-rare { background: #4a9eff; }
  .rarity-super_rare { background: #2ecc71; }
  .rarity-ultra_rare { background: #f1c40f; color: #333; }
  .rarity-secret_rare { background: #e74c3c; }
  .rarity-rainbow { background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #c77dff); }
  .btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .btn-primary { background: #111; color: #fff; }
  .btn-danger { background: #e74c3c; color: #fff; }
  .btn-edit { background: #f0f0f0; color: #333; }
  .btn-code { background: #4a9eff; color: #fff; }
  .btn-reply { background: #2ecc71; color: #fff; }
  .btn-hide { background: #f39c12; color: #fff; }
  .btn-show { background: #2ecc71; color: #fff; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 13px; color: #666; }
  .form-group input, .form-group select, .form-group textarea { padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-actions { margin-top: 16px; display: flex; gap: 8px; }
  .section { display: none; }
  .section.active { display: block; }
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
  .modal.open { display: flex; }
  .modal-content { background: #fff; border-radius: 12px; padding: 24px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
  .modal-content h3 { margin-bottom: 16px; }
  .code-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
  .code-used { color: #aaa; text-decoration: line-through; }
  .badge-used { background: #aaa; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
  .badge-available { background: #2ecc71; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
  .badge-published { background: #2ecc71; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
  .badge-hidden { background: #aaa; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
  .stars { color: #f1c40f; font-size: 16px; }
  .review-body { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .reply-text { font-size: 12px; color: #4a9eff; margin-top: 4px; }
</style>
</head>
<body>

<div class="header">
  <h1>💎 LIBASE ポイント管理画面</h1>
  <div class="tabs">
    <button class="tab active" onclick="showSection('rewards', this)">景品管理</button>
    <button class="tab" onclick="showSection('history', this)">当選履歴</button>
    <button class="tab" onclick="showSection('reviews', this)">レビュー管理</button>
    <button class="tab" onclick="showSection('points', this)">ポイント管理</button>
  </div>
</div>

<div class="container">

  <!-- 景品管理 -->
  <div id="section-rewards" class="section active">
    <div class="card">
      <h2>景品を追加</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>景品名</label>
          <input type="text" id="add-name" placeholder="例：500円OFF">
        </div>
        <div class="form-group">
          <label>レアリティ</label>
          <select id="add-rarity">
            <option value="normal">⬜ Normal（白・ハズレ）</option>
            <option value="rare">🟦 Rare（青）</option>
            <option value="super_rare">🟩 Super Rare（緑）</option>
            <option value="ultra_rare">🟨 Ultra Rare（金）</option>
            <option value="secret_rare">🟥 Secret Rare（赤）</option>
            <option value="rainbow">🌈 Rainbow（虹・神引き）</option>
          </select>
        </div>
        <div class="form-group">
          <label>景品タイプ</label>
          <select id="add-type">
            <option value="discount">割引コード（自動発行）</option>
            <option value="shipping">送料無料（自動発行）</option>
            <option value="external">外部コード（スタバ・アマギフ等）</option>
            <option value="manual">手動対応</option>
          </select>
        </div>
        <div class="form-group">
          <label>割引金額（円）</label>
          <input type="number" id="add-discount" placeholder="例：500" value="0">
        </div>
        <div class="form-group">
          <label>確率（整数）</label>
          <input type="number" id="add-probability" placeholder="例：70">
        </div>
        <div class="form-group">
          <label>在庫数</label>
          <input type="number" id="add-stock" placeholder="例：100">
        </div>
        <div class="form-group" style="grid-column: span 2;">
          <label>画像URL（任意）</label>
          <input type="text" id="add-image" placeholder="https://...">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="addReward()">追加する</button>
      </div>
    </div>

    <div class="card">
      <h2>景品一覧</h2>
      <table>
        <thead>
          <tr>
            <th>景品名</th>
            <th>レアリティ</th>
            <th>タイプ</th>
            <th>割引額</th>
            <th>確率</th>
            <th>在庫</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="rewards-table"></tbody>
      </table>
    </div>
  </div>

  <!-- 当選履歴 -->
  <div id="section-history" class="section">
    <div class="card">
      <h2>当選履歴（直近50件）</h2>
      <table>
        <thead>
          <tr>
            <th>日時</th>
            <th>顧客名</th>
            <th>メール</th>
            <th>当選景品</th>
            <th>使用ポイント</th>
            <th>発行コード</th>
          </tr>
        </thead>
        <tbody id="history-table"></tbody>
      </table>
    </div>
  </div>

  <!-- レビュー管理 -->
  <div id="section-reviews" class="section">
    <div class="card">
      <h2>レビュー一覧</h2>
      <div style="overflow-x:auto;">
        <table style="min-width:900px;">
          <thead>
            <tr>
              <th style="min-width:120px;">日時</th>
              <th style="min-width:140px;">投稿者</th>
              <th style="min-width:80px;">商品名</th>
              <th style="min-width:100px;">評価</th>
              <th style="min-width:180px;">内容</th>
              <th style="min-width:80px;">返信</th>
              <th style="min-width:60px;">状態</th>
              <th style="min-width:160px;">操作</th>
            </tr>
          </thead>
          <tbody id="reviews-table"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

  <!-- ポイント管理 -->
  <div id="section-points" class="section">
    <div class="card">
      <h2>顧客ポイント管理</h2>
      <div style="display:flex;gap:8px;margin-bottom:16px;">
        <input type="text" id="point-search" placeholder="メールアドレスで検索..." style="flex:1;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:14px;">
        <button class="btn btn-primary" onclick="searchPoints()">検索</button>
        <button class="btn btn-edit" onclick="loadPoints()">全件表示</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>メール</th>
            <th>顧客ID</th>
            <th style="text-align:right;">ポイント残高</th>
            <th style="text-align:right;">累計獲得</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="points-table"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- ポイント編集モーダル -->
<div class="modal" id="point-modal">
  <div class="modal-content">
    <h3>ポイントを変更</h3>
    <input type="hidden" id="point-customer-id">
    <div style="margin-bottom:16px;">
      <div style="font-size:13px;color:#666;margin-bottom:4px;">対象顧客</div>
      <div id="point-customer-email" style="font-size:14px;font-weight:bold;"></div>
      <div style="font-size:13px;color:#666;margin-top:8px;">現在のポイント：<strong><span id="point-current"></span>pt</strong></div>
    </div>
    <div class="form-group" style="margin-bottom:12px;">
      <label>変更タイプ</label>
      <select id="point-type">
        <option value="add">追加（+）</option>
        <option value="subtract">減算（-）</option>
        <option value="set">直接指定</option>
      </select>
    </div>
    <div class="form-group" style="margin-bottom:12px;">
      <label>ポイント数</label>
      <input type="number" id="point-amount" placeholder="例：500" min="0">
    </div>
    <div class="form-group" style="margin-bottom:16px;">
      <label>理由（任意）</label>
      <input type="text" id="point-reason" placeholder="例：キャンペーン付与">
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="submitPointChange()">変更する</button>
      <button class="btn btn-edit" onclick="closeModal('point-modal')">キャンセル</button>
    </div>
  </div>
</div>

<!-- 景品編集モーダル -->
<div class="modal" id="edit-modal">
  <div class="modal-content">
    <h3>景品を編集</h3>
    <input type="hidden" id="edit-id">
    <div class="form-grid">
      <div class="form-group">
        <label>景品名</label>
        <input type="text" id="edit-name">
      </div>
      <div class="form-group">
        <label>レアリティ</label>
        <select id="edit-rarity">
          <option value="normal">⬜ Normal（白・ハズレ）</option>
          <option value="rare">🟦 Rare（青）</option>
          <option value="super_rare">🟩 Super Rare（緑）</option>
          <option value="ultra_rare">🟨 Ultra Rare（金）</option>
          <option value="secret_rare">🟥 Secret Rare（赤）</option>
          <option value="rainbow">🌈 Rainbow（虹・神引き）</option>
        </select>
      </div>
      <div class="form-group">
        <label>景品タイプ</label>
        <select id="edit-type">
          <option value="discount">割引コード（自動発行）</option>
          <option value="shipping">送料無料（自動発行）</option>
          <option value="external">外部コード（スタバ・アマギフ等）</option>
          <option value="manual">手動対応</option>
        </select>
      </div>
      <div class="form-group">
        <label>割引金額（円）</label>
        <input type="number" id="edit-discount">
      </div>
      <div class="form-group">
        <label>確率</label>
        <input type="number" id="edit-probability">
      </div>
      <div class="form-group">
        <label>在庫数</label>
        <input type="number" id="edit-stock">
      </div>
      <div class="form-group" style="grid-column: span 2;">
        <label>画像URL</label>
        <input type="text" id="edit-image">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveEdit()">保存</button>
      <button class="btn btn-edit" onclick="closeModal('edit-modal')">キャンセル</button>
    </div>
  </div>
</div>

<!-- 外部コード管理モーダル -->
<div class="modal" id="code-modal">
  <div class="modal-content">
    <h3 id="code-modal-title">外部コード管理</h3>
    <input type="hidden" id="code-reward-id">
    <div class="form-group" style="margin-bottom:16px;">
      <label>コードを追加（1行1コード）</label>
      <textarea id="add-codes" placeholder="STARBUCKS-ABC123&#10;STARBUCKS-DEF456"></textarea>
    </div>
    <div class="form-actions" style="margin-bottom:16px;">
      <button class="btn btn-primary" onclick="addExternalCodes()">追加する</button>
    </div>
    <h4 style="font-size:14px;margin-bottom:8px;">登録済みコード</h4>
    <div id="external-codes-list"></div>
    <div class="form-actions" style="margin-top:16px;">
      <button class="btn btn-edit" onclick="closeModal('code-modal')">閉じる</button>
    </div>
  </div>
</div>

<!-- レビュー返信モーダル -->
<div class="modal" id="reply-modal">
  <div class="modal-content">
    <h3>レビューに返信</h3>
    <input type="hidden" id="reply-review-id">
    <div style="background:#f9f9f9;border-radius:8px;padding:12px;margin-bottom:16px;">
      <div id="reply-review-content"></div>
    </div>
    <div class="form-group">
      <label>返信内容</label>
      <textarea id="reply-text" placeholder="返信を入力してください..." style="min-height:120px;"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="submitReply()">返信する</button>
      <button class="btn btn-edit" onclick="closeModal('reply-modal')">キャンセル</button>
    </div>
  </div>
</div>

<script>
const RARITY_LABELS = {
  normal: '⬜ Normal',
  rare: '🟦 Rare',
  super_rare: '🟩 Super Rare',
  ultra_rare: '🟨 Ultra Rare',
  secret_rare: '🟥 Secret Rare',
  rainbow: '🌈 Rainbow'
};

const TYPE_LABELS = {
  discount: '割引コード',
  shipping: '送料無料',
  external: '外部コード',
  manual: '手動対応'
};

function showSection(name, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'history') loadHistory();
  if (name === 'rewards') loadRewards();
  if (name === 'reviews') loadReviews();
  if (name === 'points') loadPoints();
}

function formatDate(str) {
  const d = new Date(str);
  return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
}

function starsHtml(rating) {
  return '★'.repeat(rating) + '☆'.repeat(5 - rating);
}

// ===== 景品管理 =====
async function loadRewards() {
  const res = await fetch('/admin/api/rewards');
  const rewards = await res.json();
  const tbody = document.getElementById('rewards-table');
  tbody.innerHTML = rewards.map(r => `
    <tr>
      <td>${r.name}</td>
      <td><span class="rarity-badge rarity-${r.rarity}">${RARITY_LABELS[r.rarity] || r.rarity}</span></td>
      <td>${TYPE_LABELS[r.reward_type] || r.reward_type}</td>
      <td>${r.discount_amount > 0 ? r.discount_amount + '円' : '-'}</td>
      <td>${r.probability}</td>
      <td>${r.stock}</td>
      <td style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="btn btn-edit" onclick="openEdit(${r.id})">編集</button>
        ${r.reward_type === 'external' ? `<button class="btn btn-code" onclick="openCodeManager(${r.id}, '${r.name}')">コード管理</button>` : ''}
        <button class="btn btn-danger" onclick="deleteReward(${r.id})">削除</button>
      </td>
    </tr>
  `).join('');
}

async function addReward() {
  const body = {
    name: document.getElementById('add-name').value,
    rarity: document.getElementById('add-rarity').value,
    reward_type: document.getElementById('add-type').value,
    discount_amount: parseInt(document.getElementById('add-discount').value) || 0,
    probability: parseInt(document.getElementById('add-probability').value),
    stock: parseInt(document.getElementById('add-stock').value),
    image_url: document.getElementById('add-image').value || null
  };
  await fetch('/admin/api/rewards', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  loadRewards();
}

async function deleteReward(id) {
  if (!confirm('削除しますか？')) return;
  await fetch('/admin/api/rewards/' + id, { method: 'DELETE' });
  loadRewards();
}

async function openEdit(id) {
  const res = await fetch('/admin/api/rewards');
  const rewards = await res.json();
  const r = rewards.find(x => x.id === id);
  document.getElementById('edit-id').value = r.id;
  document.getElementById('edit-name').value = r.name;
  document.getElementById('edit-rarity').value = r.rarity;
  document.getElementById('edit-type').value = r.reward_type;
  document.getElementById('edit-discount').value = r.discount_amount;
  document.getElementById('edit-probability').value = r.probability;
  document.getElementById('edit-stock').value = r.stock;
  document.getElementById('edit-image').value = r.image_url || '';
  document.getElementById('edit-modal').classList.add('open');
}

async function saveEdit() {
  const id = document.getElementById('edit-id').value;
  const body = {
    name: document.getElementById('edit-name').value,
    rarity: document.getElementById('edit-rarity').value,
    reward_type: document.getElementById('edit-type').value,
    discount_amount: parseInt(document.getElementById('edit-discount').value) || 0,
    probability: parseInt(document.getElementById('edit-probability').value),
    stock: parseInt(document.getElementById('edit-stock').value),
    image_url: document.getElementById('edit-image').value || null
  };
  await fetch('/admin/api/rewards/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  closeModal('edit-modal');
  loadRewards();
}

// ===== 当選履歴 =====
async function loadHistory() {
  const res = await fetch('/admin/api/history');
  const history = await res.json();
  const tbody = document.getElementById('history-table');
  tbody.innerHTML = history.map(h => `
    <tr>
      <td>${formatDate(h.created_at)}</td>
      <td>${h.customer_name || '-'}</td>
      <td>${h.customer_email || '-'}</td>
      <td>${h.reward_name}</td>
      <td>${h.points_used}pt</td>
      <td>${h.reward_code || '-'}</td>
    </tr>
  `).join('');
}

// ===== 外部コード管理 =====
async function openCodeManager(rewardId, rewardName) {
  document.getElementById('code-reward-id').value = rewardId;
  document.getElementById('code-modal-title').textContent = `外部コード管理：${rewardName}`;
  document.getElementById('add-codes').value = '';
  await loadExternalCodes(rewardId);
  document.getElementById('code-modal').classList.add('open');
}

async function loadExternalCodes(rewardId) {
  const res = await fetch('/admin/api/external-codes/' + rewardId);
  const codes = await res.json();
  const list = document.getElementById('external-codes-list');
  if (codes.length === 0) {
    list.innerHTML = '<p style="color:#aaa;font-size:13px;">登録済みコードはありません</p>';
    return;
  }
  list.innerHTML = codes.map(c => `
    <div class="code-item">
      <span class="${c.status === 'used' ? 'code-used' : ''}">${c.code}</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <span class="${c.status === 'used' ? 'badge-used' : 'badge-available'}">${c.status === 'used' ? '使用済み' : '未使用'}</span>
        ${c.status !== 'used' ? `<button class="btn btn-danger" style="padding:3px 8px;font-size:12px;" onclick="deleteExternalCode(${c.id})">削除</button>` : ''}
      </div>
    </div>
  `).join('');
}

async function addExternalCodes() {
  const rewardId = document.getElementById('code-reward-id').value;
  const text = document.getElementById('add-codes').value.trim();
  if (!text) return;
  const codes = text.split('\n').map(c => c.trim()).filter(c => c);
  await fetch('/admin/api/external-codes', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ reward_id: rewardId, codes })
  });
  document.getElementById('add-codes').value = '';
  await loadExternalCodes(rewardId);
}

async function deleteExternalCode(id) {
  if (!confirm('削除しますか？')) return;
  await fetch('/admin/api/external-codes/' + id, { method: 'DELETE' });
  const rewardId = document.getElementById('code-reward-id').value;
  await loadExternalCodes(rewardId);
}

// ===== ポイント管理 =====
let allPointsData = [];

async function loadPoints() {
  const res = await fetch('/admin/api/points');
  allPointsData = await res.json();
  renderPointsTable(allPointsData);
}

function searchPoints() {
  const q = document.getElementById('point-search').value.trim().toLowerCase();
  const filtered = allPointsData.filter(p => p.email && p.email.toLowerCase().includes(q));
  renderPointsTable(filtered);
}

function renderPointsTable(data) {
  const tbody = document.getElementById('points-table');
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#aaa;padding:24px;">データがありません</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(p => `
    <tr>
      <td>${p.email || '-'}</td>
      <td style="font-size:12px;color:#aaa;">${p.customer_id}</td>
      <td style="text-align:right;font-weight:bold;">${p.points}pt</td>
      <td style="text-align:right;color:#aaa;">${p.total_earned}pt</td>
      <td>
        <button class="btn btn-edit" onclick="openPointModal('${p.customer_id}', '${(p.email||'').replace(/'/g,"\'")}', ${p.points})">変更</button>
      </td>
    </tr>
  `).join('');
}

function openPointModal(customerId, email, currentPoints) {
  document.getElementById('point-customer-id').value = customerId;
  document.getElementById('point-customer-email').textContent = email || customerId;
  document.getElementById('point-current').textContent = currentPoints;
  document.getElementById('point-amount').value = '';
  document.getElementById('point-reason').value = '';
  document.getElementById('point-type').value = 'add';
  document.getElementById('point-modal').classList.add('open');
}

async function submitPointChange() {
  const customerId = document.getElementById('point-customer-id').value;
  const type = document.getElementById('point-type').value;
  const amount = parseInt(document.getElementById('point-amount').value);
  const reason = document.getElementById('point-reason').value || '管理者による手動変更';

  if (!amount || amount <= 0) return alert('ポイント数を入力してください');

  const res = await fetch('/admin/api/points/' + customerId, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type, amount, reason })
  });
  const data = await res.json();

  if (data.ok) {
    closeModal('point-modal');
    loadPoints();
    alert('✅ ポイントを変更しました');
  } else {
    alert('エラーが発生しました');
  }
}

// ===== レビュー管理 =====
async function loadReviews() {
  const res = await fetch('/admin/api/reviews');
  const reviews = await res.json();
  const tbody = document.getElementById('reviews-table');
  if (reviews.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#aaa;padding:24px;">レビューはまだありません</td></tr>';
    return;
  }
  tbody.innerHTML = reviews.map(r => `
    <tr>
      <td style="white-space:nowrap;">${formatDate(r.created_at)}</td>
      <td>
        <div>${r.author_name || '-'}</div>
        <div style="font-size:12px;color:#aaa;">${r.email || ''}</div>
      </td>
      <td style="font-size:13px;">${r.product_name || '-'}</td>
      <td><span class="stars">${starsHtml(r.rating)}</span></td>
      <td>
        ${r.title ? `<div style="font-weight:bold;font-size:13px;">${r.title}</div>` : ''}
        <div class="review-body">${r.body || '-'}</div>
        ${r.image_url ? `<a href="${r.image_url}" target="_blank" style="font-size:12px;color:#4a9eff;">画像あり</a>` : ''}
      </td>
      <td>
        ${r.reply
          ? `<div class="reply-text">✅ 返信済み</div>`
          : `<span style="font-size:12px;color:#aaa;">未返信</span>`
        }
      </td>
      <td>
        <span class="badge-${r.status}">${r.status === 'published' ? '公開中' : '非公開'}</span>
      </td>
      <td style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="btn btn-reply" onclick="openReply(${r.id}, '${(r.author_name||'').replace(/'/g,"\\'")}', ${r.rating}, '${(r.body||'').replace(/'/g,"\\'").replace(/\n/g,' ')}', '${(r.reply||'').replace(/'/g,"\\'")}')">返信</button>
        ${r.status === 'published'
          ? `<button class="btn btn-hide" onclick="toggleStatus(${r.id}, 'hidden')">非公開</button>`
          : `<button class="btn btn-show" onclick="toggleStatus(${r.id}, 'published')">公開</button>`
        }
      </td>
    </tr>
  `).join('');
}

function openReply(id, authorName, rating, body, existingReply) {
  document.getElementById('reply-review-id').value = id;
  document.getElementById('reply-review-content').innerHTML = `
    <div style="font-size:13px;color:#666;margin-bottom:4px;">${authorName} ・ <span class="stars">${starsHtml(rating)}</span></div>
    <div style="font-size:14px;">${body}</div>
  `;
  document.getElementById('reply-text').value = existingReply || '';
  document.getElementById('reply-modal').classList.add('open');
}

async function submitReply() {
  const id = document.getElementById('reply-review-id').value;
  const reply = document.getElementById('reply-text').value.trim();
  if (!reply) return alert('返信内容を入力してください');
  await fetch('/admin/api/reviews/' + id + '/reply', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ reply })
  });
  closeModal('reply-modal');
  loadReviews();
}

async function toggleStatus(id, status) {
  await fetch('/admin/api/reviews/' + id + '/status', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  });
  loadReviews();
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

loadRewards();
</script>
</body>
</html>
